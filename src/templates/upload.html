<!DOCTYPE html>
<html>

<head>
    <title>Add to Inventory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --card-bg: #2d2d2d;
            --accent-color: #4a9eff;
            --border-color: #3d3d3d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            box-sizing: border-box;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 10px 0;
            z-index: 100;
        }

        .nav-tab {
            flex: 1;
            padding: 12px;
            background: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            transition: background 0.2s;
        }

        .nav-tab.active {
            background: var(--accent-color);
        }

        .nav-tab:hover {
            background: #357abd;
        }

        h1 {
            font-size: 20px;
            font-weight: 500;
            color: #aaa;
            margin: 40px 0;
            text-align: center;
            letter-spacing: 0.2px;
        }

        .highlight {
            color: var(--accent-color);
            position: relative;
            white-space: nowrap;
        }

        .upload-zone {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards 0.4s;
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        .icon-button {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .icon-button.disabled {
            background: var(--card-bg);
            cursor: not-allowed;
            border: 2px solid var(--border-color);
        }

        .icon-button:not(.disabled):hover {
            transform: scale(1.05);
            background: #357abd;
        }

        .icon-button svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .icon-button.disabled svg {
            fill: #666;
        }

        .icon-label {
            margin-top: 10px;
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }

        input[type="file"] {
            display: none;
        }

        #file-name {
            margin: 15px 0;
            color: #aaa;
            font-size: 16px;
        }

        .submit-button {
            padding: 16px 32px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 500;
            width: 100%;
            max-width: 250px;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .submit-button:hover {
            background: #357abd;
            transform: translateY(-1px);
        }

        .submit-button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 18px;
                margin: 30px 0;
            }

            .upload-zone {
                padding: 30px 15px;
            }

            .icon-button {
                width: 64px;
                height: 64px;
            }

            .icon-button svg {
                width: 28px;
                height: 28px;
            }

            .icon-label {
                font-size: 12px;
            }

            .submit-button {
                padding: 14px 28px;
                font-size: 16px;
            }
        }

        .welcome-text {
            margin: 40px auto;
            text-align: center;
            max-width: 500px;
            line-height: 1.4;
        }

        .welcome-text .small {
            font-size: 16px;
            color: #888;
            font-weight: 400;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards;
        }

        .welcome-text .large {
            font-size: 28px;
            color: var(--text-color);
            font-weight: 600;
            letter-spacing: -0.5px;
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards 0.2s;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .welcome-text {
                margin: 30px auto;
            }

            .welcome-text .small {
                font-size: 14px;
            }

            .welcome-text .large {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="nav-tabs">
        <a href="/" class="nav-tab active">Upload</a>
        <a href="/inventory" class="nav-tab">Inventory</a>
    </div>

    <div class="welcome-text">
        <div class="small">Ready to expand your collection?</div>
        <div class="large">Add to your inventory</div>
    </div>

    <div class="upload-zone">
        <form method="post" enctype="multipart/form-data">
            <div class="icons-grid">
                <div>
                    <label class="icon-button" for="file-input">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                        </svg>
                    </label>
                    <div class="icon-label">Upload Photo</div>
                </div>

                <div>
                    <label class="icon-button" for="receipt-input">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path
                                d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z" />
                        </svg>
                    </label>
                    <div class="icon-label">Scan Receipt</div>
                </div>

                <div>
                    <div class="icon-button disabled">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M4 4h16v4H4zm0 6h16v4H4zm0 6h16v4H4z" />
                        </svg>
                    </div>
                    <div class="icon-label">Scan Barcode</div>
                </div>
            </div>

            <input id="file-input" type="file" name="file" accept="image/*" capture="environment"
                onchange="updateFileName(this, 'photo')">
            <input id="receipt-input" type="file" name="receipt" accept="image/*" capture="environment"
                onchange="updateFileName(this, 'receipt')">
            <div id="file-name">No file chosen</div>
            <button type="submit" class="submit-button" id="submit-button" disabled>Analyze Image</button>
        </form>
    </div>

    <script>
        function updateFileName(input, type) {
            const fileName = input.files[0]?.name || 'No file chosen';
            document.getElementById('file-name').textContent = fileName;
            document.getElementById('submit-button').disabled = false;

            // Update the form's action based on the type of upload
            const form = input.form;
            form.action = type === 'receipt' ? '/upload_receipt' : '/';
        }
    </script>
</body>

</html>
