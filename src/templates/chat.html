<!DOCTYPE html>
<html>

<head>
    <title>Chat with Inventory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --card-bg: #2d2d2d;
            --accent-color: #4a9eff;
            --border-color: #3d3d3d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            box-sizing: border-box;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 10px 0;
            z-index: 100;
        }

        .nav-tab {
            flex: 1;
            padding: 12px;
            background: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            transition: background 0.2s;
        }

        .nav-tab.active {
            background: var(--accent-color);
        }

        .nav-tab:hover {
            background: #357abd;
        }

        .chat-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }

        #chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg-color);
        }

        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
        }

        .message.user {
            background-color: var(--accent-color);
            color: white;
            margin-left: auto;
            border-radius: 15px 15px 0 15px;
        }

        .message.assistant {
            background-color: var(--card-bg);
            margin-right: auto;
            border-radius: 15px 15px 15px 0;
        }

        .message.error {
            background-color: #ff4444;
            color: white;
            margin: 10px auto;
            text-align: center;
        }

        #chat-form {
            padding: 20px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #query-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
        }

        #query-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--accent-color);
        }

        button[type="submit"] {
            padding: 12px 24px;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        button[type="submit"]:hover {
            background: #357abd;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>
    <div class="nav-tabs">
        <a href="/upload" class="nav-tab">Upload</a>
        <a href="/inventory" class="nav-tab">Inventory</a>
        <a href="/chat" class="nav-tab active">Chat</a>
    </div>

    <div class="welcome-text">
        <div class="small">Ask me anything about</div>
        <div class="large">Your Inventory</div>
    </div>

    <div class="chat-container">
        <div id="chat-messages">
            <!-- Messages will appear here -->
        </div>
        <form id="chat-form">
            <div class="input-group">
                <input type="text" id="query-input" placeholder="Ask about your inventory..." required>
                <button type="submit">Send</button>
            </div>
        </form>
    </div>

    <!-- Footer: Powered by Gravity AI -->
    <footer style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color);">
        <div style="display: inline-block; text-align: left;">
            <p style="margin: 0; font-size: 14px; color: #aaa;">Powered by</p>
            <div style="display: flex; align-items: center; gap: 15px; margin-top: 10px;">
                <img src="/static/gravity-ai-logo-white.svg" alt="Gravity AI Logo" style="max-height: 50px;">
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('chat-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const input = document.getElementById('query-input');
            const query = input.value.trim();
            if (!query) return;

            addMessage('user', query);
            input.value = '';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();

                if (data.error) {
                    addMessage('error', data.error);
                } else {
                    addMessage('assistant', formatResults(data.results));
                }
            } catch (error) {
                addMessage('error', 'Failed to get response. Please try again.');
            }
        });

        function addMessage(type, content) {
            const messagesDiv = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = content;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function formatResults(results) {
            if (!results || results.length === 0) {
                return "I couldn't find any relevant items in your inventory.";
            }

            return results.map(item =>
                `${item.name} - Located in: ${item.room}\n` +
                `Price: $${item.price} | Quantity: ${item.quantity}`
            ).join('\n\n');
        }
    </script>
</body>

</html>
