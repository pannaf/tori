<!DOCTYPE html>
<html>

<head>
    <title>Detection Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --card-bg: #2d2d2d;
            --accent-color: #4a9eff;
            --border-color: #3d3d3d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            font-size: 24px;
            margin: 20px 0;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 10px 0;
            z-index: 100;
        }

        .nav-tab {
            flex: 1;
            padding: 12px;
            background: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            transition: background 0.2s;
        }

        .nav-tab.active {
            background: var(--accent-color);
        }

        .nav-tab:hover {
            background: #357abd;
        }

        .result-container {
            margin: 20px 0;
        }

        .main-image-container {
            width: 100%;
            margin-bottom: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
        }

        .result-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .objects-grid {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        }

        .object-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .object-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }

        .object-info {
            padding: 12px;
        }

        .object-label {
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--accent-color);
        }

        .confidence {
            font-size: 14px;
            color: #aaa;
        }

        .back-button {
            display: inline-block;
            padding: 12px 24px;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-weight: 500;
            transition: background 0.2s;
        }

        .back-button:hover {
            background: #357abd;
        }

        .room-classification {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin: -10px 0 20px 0;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .room-label {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .room-value {
            font-size: 16px;
            color: var(--text-color);
            text-transform: capitalize;
        }

        /* Mobile responsive styles */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 20px;
            }

            .nav-tab {
                padding: 10px;
                font-size: 14px;
            }

            .objects-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }

            .object-card img {
                height: 120px;
            }

            .object-info {
                padding: 8px;
            }

            .object-label {
                font-size: 14px;
            }

            .confidence {
                font-size: 12px;
            }

            .back-button {
                display: block;
                margin: 20px auto;
                max-width: 200px;
                text-align: center;
                padding: 10px 20px;
                font-size: 14px;
            }

            .room-classification {
                padding: 12px;
                margin: -5px 0 15px 0;
            }

            .room-label {
                font-size: 16px;
            }

            .room-value {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="nav-tabs">
        <a href="/upload" class="nav-tab active">Upload</a>
        <a href="/inventory" class="nav-tab">Inventory</a>
    </div>
    <h1>Detection Results</h1>

    <div class="result-container">
        <div class="main-image-container">
            <img class="result-image" src="data:image/png;base64,{{ image_data }}" alt="Detection Result">
        </div>

        <div class="room-classification">
            <div class="room-label">Room Classification</div>
            <div class="room-value">{{ room_type }}</div>
        </div>

        <div class="objects-grid">
            {% for obj in cropped_objects %}
            <div class="object-card">
                <img src="data:image/png;base64,{{ obj.image }}" alt="{{ obj.label }}">
                <div class="object-info">
                    <div class="object-label">{{ obj.label }}</div>
                    <div class="confidence">{{ "%.1f"|format(obj.confidence * 100) }}%</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <a href="/upload" class="back-button">Upload Another Image</a>
</body>

</html>
